name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.175.104.101
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== DIAGNOSTIC + FIX RUN $(date) ==="

            echo "=== ALL CONTAINERS ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo "=== NETWORKS ==="
            docker network ls
            echo "=== caddy-net containers ==="
            docker network inspect caddy-net --format='{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null || echo "caddy-net NOT FOUND"

            echo "=== APP INTERNAL TEST ==="
            docker exec sepe-bot-container curl -sf http://localhost:10000/api/server-info 2>&1 || echo "INTERNAL CHECK FAILED"

            echo "=== CADDY DIAGNOSTICS ==="
            CADDY=$(docker ps -a --format "{{.Names}}" | grep -i caddy | head -1)
            echo "Caddy container name: '$CADDY'"
            if [ -n "$CADDY" ]; then
              echo "=== Caddy logs (last 20) ==="
              docker logs "$CADDY" --tail 20 2>&1
              echo "=== Caddy config ==="
              docker exec "$CADDY" cat /etc/caddy/Caddyfile 2>/dev/null || echo "No Caddyfile"
              echo "=== Test curl from Caddy to app ==="
              docker exec "$CADDY" wget -q -O- http://sepe-bot-container:10000/api/server-info 2>&1 || echo "wget FAILED - THIS IS THE 502 CAUSE"
            fi

            # FIX: Explicitly connect Caddy to caddy-net
            echo "=== APPLYING FIX: reconnect Caddy to caddy-net ==="
            if [ -n "$CADDY" ]; then
              docker network connect caddy-net "$CADDY" 2>/dev/null && echo "Connected Caddy to caddy-net" || echo "Caddy already on caddy-net (or error)"
              docker restart "$CADDY" 2>/dev/null && echo "Caddy restarted" || echo "Caddy restart failed"
              sleep 3
              echo "=== After fix: test from Caddy ==="
              docker exec "$CADDY" wget -q -O- http://sepe-bot-container:10000/api/server-info 2>&1 || echo "Still failing after fix"
            fi

            echo "=== caddy-net containers AFTER fix ==="
            docker network inspect caddy-net --format='{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null || echo "caddy-net NOT FOUND"

            echo "=== MEMORY ==="
            free -m 2>/dev/null || cat /proc/meminfo | head -5

            echo "=== DONE $(date) ==="
