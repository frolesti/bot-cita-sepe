name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.175.104.101
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            REPO_DIR="$HOME/bot-cita-sepe"
            REPO_URL="https://github.com/frolesti/bot-cita-sepe.git"
            CONTAINER_NAME="sepe-bot-container"
            IMAGE_NAME="sepe-bot"

            echo "=== DEPLOY START $(date) ==="

            # Pull latest code (COS has no git, use alpine/git)
            if [ -d "$REPO_DIR/.git" ]; then
              echo ">> Pulling latest changes..."
              docker run --rm -v "$REPO_DIR":/repo alpine/git -C /repo pull origin main
            else
              echo ">> Cloning repo..."
              rm -rf "$REPO_DIR"
              docker run --rm -v "$REPO_DIR":/repo alpine/git clone "$REPO_URL" /repo
            fi

            # Ensure .env is readable
            sudo chmod 644 "$REPO_DIR/.env" 2>/dev/null || true

            # Build new image
            echo ">> Building Docker image..."
            cd "$REPO_DIR"
            docker build -t "$IMAGE_NAME" .

            # Clean up old images/containers to free disk space
            echo ">> Cleaning up old Docker resources..."
            docker image prune -f
            docker container prune -f
            docker builder prune -f 2>/dev/null || true

            # Restart container
            echo ">> Restarting container..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true
            docker network create caddy-net 2>/dev/null || true

            # Disk usage diagnostic
            echo ">> Disk usage:"
            df -h / | tail -1
            echo ">> Docker disk usage:"
            docker system df 2>/dev/null || true

            docker run -d \
              --name "$CONTAINER_NAME" \
              --network caddy-net \
              -p 10000:10000 \
              --env-file "$REPO_DIR/.env" \
              --restart unless-stopped \
              "$IMAGE_NAME"

            # System diagnostics
            echo ">> Memory:"
            free -m 2>/dev/null || cat /proc/meminfo | head -5
            echo ">> OOM events (last 10):"
            dmesg 2>/dev/null | grep -i "oom\|killed" | tail -10 || true

            sleep 4
            if docker ps | grep -q "$CONTAINER_NAME"; then
              echo ">> Container running OK after 4s"
            else
              echo ">> ERROR: Container not running after 4s!"
              docker logs "$CONTAINER_NAME" --tail 50
              exit 1
            fi

            # Wait longer and check again (catch delayed crashes)
            sleep 15
            if docker ps | grep -q "$CONTAINER_NAME"; then
              echo ">> Container still running after 19s - GOOD"
              docker logs "$CONTAINER_NAME" --tail 30
            else
              echo ">> ERROR: Container CRASHED after initial start!"
              echo ">> Container inspect:"
              docker inspect "$CONTAINER_NAME" --format='{{.State.Status}} ExitCode={{.State.ExitCode}} OOMKilled={{.State.OOMKilled}} RestartCount={{.RestartCount}}' 2>/dev/null || true
              echo ">> Full container logs:"
              docker logs "$CONTAINER_NAME" --tail 100
              # Try to restart it
              echo ">> Attempting restart..."
              docker start "$CONTAINER_NAME"
              sleep 5
              docker logs "$CONTAINER_NAME" --tail 30
              exit 1
            fi

            # Also make sure Caddy can reach the container
            echo ">> Testing local connectivity:"
            docker exec "$CONTAINER_NAME" curl -sf http://localhost:10000/api/server-info || echo ">> WARNING: internal health check failed"

            echo "=== DEPLOY OK $(date) ==="
