name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.175.104.101
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            REPO_DIR="$HOME/bot-cita-sepe"
            REPO_URL="https://github.com/frolesti/bot-cita-sepe.git"
            CONTAINER_NAME="sepe-bot-container"
            IMAGE_NAME="sepe-bot"

            echo "=== DEPLOY START $(date) ==="

            # Pre-deploy diagnostics
            echo ">> Disk BEFORE cleanup:"
            df -h / | tail -1
            echo ">> Docker disk BEFORE cleanup:"
            docker system df 2>/dev/null || true
            echo ">> Running containers:"
            docker ps --format "{{.Names}} {{.Status}}" 2>/dev/null || true
            echo ">> All containers:"
            docker ps -a --format "{{.Names}} {{.Status}}" 2>/dev/null || true
            echo ">> Memory BEFORE:"
            free -m 2>/dev/null || cat /proc/meminfo | head -5

            # Stop old app container
            echo ">> Stopping old container..."
            docker stop "$CONTAINER_NAME" 2>/dev/null || true
            docker rm "$CONTAINER_NAME" 2>/dev/null || true

            # Aggressive cleanup: remove ALL unused images, containers, volumes, networks
            echo ">> Aggressive Docker cleanup..."
            docker system prune -a -f --volumes 2>/dev/null || true

            echo ">> Disk AFTER cleanup:"
            df -h / | tail -1

            # Pull latest code (COS has no git, use alpine/git)
            if [ -d "$REPO_DIR/.git" ]; then
              echo ">> Pulling latest changes..."
              docker run --rm -v "$REPO_DIR":/repo alpine/git -C /repo pull origin main
            else
              echo ">> Cloning repo..."
              rm -rf "$REPO_DIR"
              docker run --rm -v "$REPO_DIR":/repo alpine/git clone "$REPO_URL" /repo
            fi

            # Ensure .env is readable
            sudo chmod 644 "$REPO_DIR/.env" 2>/dev/null || true
            echo ">> .env content (keys only):"
            grep -oP '^[A-Z_]+' "$REPO_DIR/.env" 2>/dev/null || echo "(no .env or empty)"

            # Build new image
            echo ">> Building Docker image..."
            cd "$REPO_DIR"
            docker build -t "$IMAGE_NAME" .

            # Ensure caddy-net exists
            docker network create caddy-net 2>/dev/null || true

            # Start new container
            echo ">> Starting container..."
            docker run -d \
              --name "$CONTAINER_NAME" \
              --network caddy-net \
              -p 10000:10000 \
              --env-file "$REPO_DIR/.env" \
              --restart unless-stopped \
              "$IMAGE_NAME"

            echo ">> Memory AFTER start:"
            free -m 2>/dev/null || cat /proc/meminfo | head -5
            echo ">> OOM events (last 20):"
            dmesg 2>/dev/null | grep -i "oom\|killed\|memory" | tail -20 || true

            # Check container status after 5s
            sleep 5
            if docker ps | grep -q "$CONTAINER_NAME"; then
              echo ">> Container running after 5s - OK"
            else
              echo ">> ERROR: Container NOT running after 5s!"
              echo ">> Container inspect:"
              docker inspect "$CONTAINER_NAME" --format='Status={{.State.Status}} Exit={{.State.ExitCode}} OOM={{.State.OOMKilled}} Restarts={{.RestartCount}}' 2>/dev/null || true
              docker logs "$CONTAINER_NAME" --tail 80
              exit 1
            fi

            # Check again after 20s total (catch delayed crashes)
            sleep 15
            if docker ps | grep -q "$CONTAINER_NAME"; then
              echo ">> Container still running after 20s - GOOD"
            else
              echo ">> ERROR: Container CRASHED after initial start!"
              docker inspect "$CONTAINER_NAME" --format='Status={{.State.Status}} Exit={{.State.ExitCode}} OOM={{.State.OOMKilled}} Restarts={{.RestartCount}}' 2>/dev/null || true
              docker logs "$CONTAINER_NAME" --tail 100
              exit 1
            fi

            # Internal health check
            echo ">> Internal health check:"
            docker exec "$CONTAINER_NAME" curl -sf http://localhost:10000/api/server-info && echo " OK" || echo " FAILED"

            # Final container logs
            echo ">> Container logs:"
            docker logs "$CONTAINER_NAME" --tail 40

            # Check Caddy is running too
            echo ">> Caddy container:"
            CADDY_NAME=$(docker ps -a --filter "name=caddy" --format "{{.Names}}" | head -1)
            if [ -n "$CADDY_NAME" ]; then
              if docker ps --filter "name=$CADDY_NAME" --filter "status=running" -q | grep -q .; then
                echo ">> Caddy is running: $CADDY_NAME"
              else
                echo ">> WARNING: Caddy container exists but not running, restarting..."
                docker start "$CADDY_NAME" 2>/dev/null || echo ">> Could not start Caddy"
              fi
            else
              echo ">> WARNING: No Caddy container found!"
            fi

            echo "=== DEPLOY OK $(date) ==="
