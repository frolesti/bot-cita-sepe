name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.175.104.101
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            exec 2>&1
            DIAG="/tmp/sepe_diag_$(date +%s).txt"
            {
              echo "=== DIAGNOSTIC RUN $(date) ==="

              echo "=== ALL CONTAINERS ==="
              docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

              echo "=== NETWORKS ==="
              docker network ls

              echo "=== caddy-net FULL INSPECT ==="
              docker network inspect caddy-net 2>/dev/null || echo "caddy-net NOT FOUND"

              echo "=== APP INTERNAL TEST ==="
              docker exec sepe-bot-container curl -sf http://localhost:10000/api/server-info 2>&1 || echo "INTERNAL CHECK FAILED"

              echo "=== CADDY DIAGNOSTICS ==="
              CADDY=$(docker ps -a --format "{{.Names}}" | grep -i caddy | head -1)
              echo "Caddy container name: '$CADDY'"
              if [ -n "$CADDY" ]; then
                echo "=== Caddy container inspect (Networks) ==="
                docker inspect "$CADDY" --format='{{json .NetworkSettings.Networks}}' 2>/dev/null
                echo ""
                echo "=== Caddy logs (last 40) ==="
                docker logs "$CADDY" --tail 40 2>&1
                echo "=== Caddyfile ==="
                docker exec "$CADDY" cat /etc/caddy/Caddyfile 2>/dev/null || echo "No Caddyfile found"
                echo "=== Test from Caddy to app ==="
                docker exec "$CADDY" wget -q -O- http://sepe-bot-container:10000/api/server-info 2>&1 || echo "wget FAILED"
                echo "=== nslookup from Caddy ==="
                docker exec "$CADDY" nslookup sepe-bot-container 2>&1 || echo "nslookup not available"
                echo "=== ping from Caddy ==="
                docker exec "$CADDY" ping -c 2 sepe-bot-container 2>&1 || echo "ping failed or not available"
              else
                echo "NO CADDY CONTAINER FOUND!"
              fi

              echo "=== APP container inspect (Networks) ==="
              docker inspect sepe-bot-container --format='{{json .NetworkSettings.Networks}}' 2>/dev/null || echo "app container not found"
              echo ""

              echo "=== MEMORY ==="
              free -m 2>/dev/null || cat /proc/meminfo | head -5

              echo "=== DISK ==="
              df -h / 2>/dev/null

              echo "=== DOCKER INFO ==="
              docker info 2>&1 | head -20

              echo "=== DONE $(date) ==="
            } > "$DIAG" 2>&1

            cat "$DIAG"

            # Upload to paste services
            echo "=== UPLOADING DIAGNOSTICS ==="
            PASTE_URL=$(curl -sf --data-binary @"$DIAG" https://paste.rs/ 2>/dev/null) && echo "PASTE: $PASTE_URL" || echo "paste.rs failed"
            PASTE_URL2=$(curl -sf -F 'sprunge=<'"$DIAG" http://sprunge.us 2>/dev/null) && echo "SPRUNGE: $PASTE_URL2" || echo "sprunge.us failed"
            IX_URL=$(cat "$DIAG" | curl -sf -F 'f:1=<-' ix.io 2>/dev/null) && echo "IX: $IX_URL" || echo "ix.io failed"
