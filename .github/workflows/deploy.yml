name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 34.175.104.101
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=== DIAGNOSTIC RUN $(date) ==="

            echo "=== ALL CONTAINERS ==="
            docker ps -a --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}\t{{.Image}}"

            echo "=== DOCKER NETWORKS ==="
            docker network ls
            echo "=== caddy-net inspect ==="
            docker network inspect caddy-net 2>/dev/null | head -60 || echo "caddy-net not found"

            echo "=== DISK ==="
            df -h / | tail -1

            echo "=== MEMORY ==="
            free -m 2>/dev/null || cat /proc/meminfo | head -5

            echo "=== APP CONTAINER LOGS (last 50) ==="
            docker logs sepe-bot-container --tail 50 2>&1 || echo "No sepe-bot-container"

            echo "=== APP INTERNAL TEST ==="
            docker exec sepe-bot-container curl -sf http://localhost:10000/api/server-info 2>&1 || echo "INTERNAL CHECK FAILED"

            echo "=== CADDY CONTAINER LOGS (last 30) ==="
            CADDY=$(docker ps -a --format "{{.Names}}" | grep -i caddy | head -1)
            if [ -n "$CADDY" ]; then
              echo "Caddy container: $CADDY"
              docker logs "$CADDY" --tail 30 2>&1
              echo "=== CADDY CONFIG ==="
              docker exec "$CADDY" cat /etc/caddy/Caddyfile 2>/dev/null || echo "No Caddyfile found"
              docker exec "$CADDY" caddy list-modules 2>/dev/null | head -5 || true
              echo "=== CURL FROM CADDY TO APP ==="
              docker exec "$CADDY" wget -q -O- http://sepe-bot-container:10000/api/server-info 2>&1 || echo "wget from caddy FAILED"
              docker exec "$CADDY" curl -sf http://sepe-bot-container:10000/api/server-info 2>&1 || echo "curl from caddy FAILED"
            else
              echo "NO CADDY CONTAINER FOUND"
            fi

            echo "=== IPTABLES ==="
            sudo iptables -L -n 2>/dev/null | head -30 || echo "no iptables"

            echo "=== OOM EVENTS ==="
            dmesg 2>/dev/null | grep -i "oom\|killed\|memory" | tail -20 || true

            echo "=== DIAGNOSTIC DONE ==="
