name: Deploy to GCP VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to VM via SSH
        run: |
          gcloud compute ssh sepe-bot \
            --zone=europe-southwest1-a \
            --project=trobar-1123f \
            --command="
              cd /tmp && rm -rf bot-cita-sepe && \
              git clone https://github.com/frolesti/bot-cita-sepe.git && \
              cd bot-cita-sepe && \
              docker build -t sepe-bot:latest . && \
              docker stop sepe-bot || true && \
              docker rm sepe-bot || true && \
              docker run -d --name sepe-bot -p 10000:10000 \
                -e MAIL_USERNAME=\${{ secrets.MAIL_USERNAME }} \
                -e MAIL_PASSWORD='\${{ secrets.MAIL_PASSWORD }}' \
                -e SECRET_KEY=\${{ secrets.SECRET_KEY }} \
                sepe-bot:latest && \
              sleep 3 && docker logs sepe-bot --tail 5
            "
